services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-touch-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3100
      DATABASE_URL: postgresql://sms_touch:sms_touch_dev@postgres:5432/sms_touch?schema=public
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: sms-touch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sms_touch
      POSTGRES_USER: sms_touch
      POSTGRES_PASSWORD: sms_touch_dev
    ports:
      - "5432:5432"
    volumes:
      - sms_touch_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_touch -d sms_touch"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  sms_touch_pg_data:
